# GitHub issue form for unattended-eligible bugs.
# Copy to <target-repo>/.github/ISSUE_TEMPLATE/claude-auto-bug.yml
#
# Deliberately does NOT auto-apply the claude-auto label — applying the label
# is the human opt-in that triggers the run (and it only counts from
# allowlisted authors). Structured fields make intake deterministic: the spec
# phase derives from these answers as data.

name: Bug (claude-auto eligible)
description: A defect suitable for the unattended pipeline (quick track — no architecture change expected)
labels: []            # do not pre-label; the trigger label is applied manually
body:
  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: What happens, where, since when. Include exact error messages.
      placeholder: "POST /v1/login returns 500 since the 2026-07-08 deploy when ..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Smallest sequence that shows the bug, with concrete inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Suspected component (optional)
      description: Service/module hint if you have one — helps triage, not binding.
  - type: textarea
    id: evidence
    attributes:
      label: Evidence (optional)
      description: Log lines, correlation IDs, time window, links.
  - type: checkboxes
    id: quicktrack
    attributes:
      label: Quick-track eligibility
      options:
        - label: I expect this to be a bounded bugfix (no architecture or spec-surface change)
          required: true
