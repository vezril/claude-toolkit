<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 470" role="img">
<title>The per-story implementation cycle</title>
<desc>A story flows from create story to the test-writer, which ping-pongs failing tests and green suites with the implementer across a hook-enforced file boundary, then to execution-grounded review and the QA gate, looping to the next story.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;fill:#3d3d3a}
.th{font-size:14px;font-weight:600}
.ts{font-size:12px;fill:#73726c}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
g.teal>rect{fill:#E1F5EE;stroke:#0F6E56}
g.teal text.th{fill:#085041}
g.teal text.ts{fill:#0F6E56}
g.gray>rect{fill:#F1EFE8;stroke:#5F5E5A}
g.gray text.th{fill:#444441}
g.gray text.ts{fill:#5F5E5A}
g.red>rect{fill:#FCEBEB;stroke:#A32D2D}
g.red text.th{fill:#791F1F}
g.red text.ts{fill:#A32D2D}
g.green>rect{fill:#EAF3DE;stroke:#3B6D11}
g.green text.th{fill:#27500A}
g.green text.ts{fill:#3B6D11}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="470" fill="#ffffff"/>
<g class="gray">
  <rect x="230" y="30" width="220" height="56" rx="8"/>
  <text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">Create story</text>
  <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">story-planner</text>
</g>
<path d="M340 90 L340 118 L170 118 L170 146" class="arr" marker-end="url(#arrow)"/>
<g class="red">
  <rect x="60" y="150" width="220" height="56" rx="8"/>
  <text class="th" x="170" y="168" text-anchor="middle" dominant-baseline="central">test-writer — red</text>
  <text class="ts" x="170" y="188" text-anchor="middle" dominant-baseline="central">test code only</text>
</g>
<g class="green">
  <rect x="400" y="150" width="220" height="56" rx="8"/>
  <text class="th" x="510" y="168" text-anchor="middle" dominant-baseline="central">implementer — green</text>
  <text class="ts" x="510" y="188" text-anchor="middle" dominant-baseline="central">production code only</text>
</g>
<text class="ts" x="340" y="156" text-anchor="middle" dominant-baseline="central">failing test</text>
<line x1="284" y1="168" x2="396" y2="168" class="arr" marker-end="url(#arrow)"/>
<line x1="396" y1="190" x2="284" y2="190" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="204" text-anchor="middle" dominant-baseline="central">green suite</text>
<text class="ts" x="340" y="230" text-anchor="middle" dominant-baseline="central">PreToolUse hook: denies cross-boundary edits</text>
<path d="M510 210 L510 248 L340 248 L340 266" class="arr" marker-end="url(#arrow)"/>
<g class="teal">
  <rect x="230" y="270" width="220" height="56" rx="8"/>
  <text class="th" x="340" y="288" text-anchor="middle" dominant-baseline="central">Review — runs the code</text>
  <text class="ts" x="340" y="308" text-anchor="middle" dominant-baseline="central">clean-code + stack reviewers</text>
</g>
<line x1="340" y1="330" x2="340" y2="356" class="arr" marker-end="url(#arrow)"/>
<g class="teal">
  <rect x="230" y="360" width="220" height="56" rx="8"/>
  <text class="th" x="340" y="378" text-anchor="middle" dominant-baseline="central">QA gate</text>
  <text class="ts" x="340" y="398" text-anchor="middle" dominant-baseline="central">qa-test-architect — executed</text>
</g>
<text class="ts" x="340" y="442" text-anchor="middle" dominant-baseline="central">↻ next story once the gate is green · retrospective per epic</text>
</svg>
