<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 600" role="img">
<title>Unattended mode (trust rung 1): where the human remains</title>
<desc>The unattended pipeline from a labeled issue to a PR: human opt-in at the start, then trigger guards, spec, solutioning with deterministic validators, build, verify, and a refuting review on a separate model — with the only other human action being the PR merge; every failure escalates to a needs-human label.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;fill:#3d3d3a}
.th{font-size:14px;font-weight:600}
.ts{font-size:12px;fill:#73726c}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
g.purple>rect{fill:#EEEDFE;stroke:#534AB7}
g.purple text.ts{fill:#3C3489}
g.teal>rect{fill:#E1F5EE;stroke:#0F6E56}
g.teal text.th{fill:#085041}
g.teal text.ts{fill:#0F6E56}
g.coral>rect{fill:#FAECE7;stroke:#993C1D}
g.coral text.th{fill:#712B13}
g.coral text.ts{fill:#993C1D}
g.amber>rect{fill:#FAEEDA;stroke:#854F0B}
g.amber text.ts{fill:#633806}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="600" fill="#ffffff"/>
<g class="purple"><rect x="210" y="40" width="260" height="24" rx="12"/>
  <text class="ts" x="340" y="52" text-anchor="middle" dominant-baseline="central">you: file the issue + apply label</text></g>
<line x1="340" y1="64" x2="340" y2="80" class="arr"/>
<g class="amber"><rect x="210" y="80" width="260" height="24" rx="12"/>
  <text class="ts" x="340" y="92" text-anchor="middle" dominant-baseline="central">guards — allowlist · breaker</text></g>
<line x1="340" y1="104" x2="340" y2="120" class="arr" marker-end="url(#arrow)"/>
<g class="teal">
  <rect x="200" y="120" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">Spec</text>
  <text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">quick track or escalate</text>
</g>
<line x1="340" y1="176" x2="340" y2="192" class="arr" marker-end="url(#arrow)"/>
<g class="teal">
  <rect x="200" y="192" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="210" text-anchor="middle" dominant-baseline="central">Solutioning</text>
  <text class="ts" x="340" y="230" text-anchor="middle" dominant-baseline="central">change artifacts + stories</text>
</g>
<line x1="340" y1="248" x2="340" y2="264" class="arr"/>
<g class="amber"><rect x="210" y="264" width="260" height="24" rx="12"/>
  <text class="ts" x="340" y="276" text-anchor="middle" dominant-baseline="central">lint-story.py + openspec validate</text></g>
<line x1="340" y1="288" x2="340" y2="304" class="arr" marker-end="url(#arrow)"/>
<g class="coral">
  <rect x="200" y="304" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="322" text-anchor="middle" dominant-baseline="central">Build</text>
  <text class="ts" x="340" y="342" text-anchor="middle" dominant-baseline="central">test-writer ⇄ implementer</text>
</g>
<line x1="340" y1="360" x2="340" y2="376" class="arr"/>
<g class="amber"><rect x="210" y="376" width="260" height="24" rx="12"/>
  <text class="ts" x="340" y="388" text-anchor="middle" dominant-baseline="central">verify — suite + protected paths</text></g>
<line x1="340" y1="400" x2="340" y2="416" class="arr"/>
<g class="teal"><rect x="210" y="416" width="260" height="24" rx="12"/>
  <text class="ts" x="340" y="428" text-anchor="middle" dominant-baseline="central">refuting review — other model</text></g>
<line x1="340" y1="440" x2="340" y2="456" class="arr"/>
<g class="purple"><rect x="210" y="456" width="260" height="24" rx="12"/>
  <text class="ts" x="340" y="468" text-anchor="middle" dominant-baseline="central">you merge the PR</text></g>
<line x1="340" y1="480" x2="340" y2="504" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="522" text-anchor="middle" dominant-baseline="central">shipped · openspec archive stays yours</text>
<text class="ts" x="340" y="548" text-anchor="middle" dominant-baseline="central">any failure → findings comment on the issue + needs-human label</text>
<text class="ts" x="340" y="576" text-anchor="middle" dominant-baseline="central">purple = human · amber = deterministic script · teal = LLM checker</text>
</svg>
