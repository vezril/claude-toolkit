<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 590" role="img">
<title>The SDLC pipeline</title>
<desc>Four phases coordinated by the sdlc-orchestrator: analysis, planning, solutioning, and implementation, with a deterministic story lint gate between solutioning and implementation, ending in code and tests. Each handoff produces an artifact and requires human approval.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;fill:#3d3d3a}
.th{font-size:14px;font-weight:600}
.ts{font-size:12px;fill:#73726c}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
g.purple>rect{fill:#EEEDFE;stroke:#534AB7}
g.purple text.th{fill:#3C3489}
g.purple text.ts{fill:#534AB7}
g.teal>rect{fill:#E1F5EE;stroke:#0F6E56}
g.teal text.th{fill:#085041}
g.teal text.ts{fill:#0F6E56}
g.coral>rect{fill:#FAECE7;stroke:#993C1D}
g.coral text.th{fill:#712B13}
g.coral text.ts{fill:#993C1D}
g.gray>rect{fill:#F1EFE8;stroke:#5F5E5A}
g.gray text.th{fill:#444441}
g.gray text.ts{fill:#5F5E5A}
g.amber>rect{fill:#FAEEDA;stroke:#854F0B}
g.amber text.ts{fill:#633806}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="590" fill="#ffffff"/>
<g class="purple">
  <rect x="150" y="30" width="380" height="476" rx="20"/>
  <text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">sdlc-orchestrator</text>
  <text class="ts" x="340" y="78" text-anchor="middle" dominant-baseline="central">gates each handoff with you</text>
</g>
<g class="gray">
  <rect x="190" y="100" width="300" height="56" rx="8"/>
  <text class="th" x="340" y="118" text-anchor="middle" dominant-baseline="central">Analysis (optional)</text>
  <text class="ts" x="340" y="138" text-anchor="middle" dominant-baseline="central">requirements-analyst, discovery</text>
</g>
<line x1="340" y1="160" x2="340" y2="196" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="178" text-anchor="start" dominant-baseline="central">product brief</text>
<g class="teal">
  <rect x="190" y="200" width="300" height="56" rx="8"/>
  <text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central">Planning</text>
  <text class="ts" x="340" y="238" text-anchor="middle" dominant-baseline="central">requirements-analyst</text>
</g>
<line x1="340" y1="260" x2="340" y2="296" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="278" text-anchor="start" dominant-baseline="central">PRD / SRS</text>
<g class="teal">
  <rect x="190" y="300" width="300" height="56" rx="8"/>
  <text class="th" x="340" y="318" text-anchor="middle" dominant-baseline="central">Solutioning</text>
  <text class="ts" x="340" y="338" text-anchor="middle" dominant-baseline="central">solution-architect + story-planner</text>
</g>
<line x1="340" y1="360" x2="340" y2="426" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="352" y="374" text-anchor="start" dominant-baseline="central">architecture + stories</text>
<g class="amber">
  <rect x="255" y="384" width="170" height="24" rx="12"/>
  <text class="ts" x="340" y="396" text-anchor="middle" dominant-baseline="central">story lint gate</text>
</g>
<g class="coral">
  <rect x="190" y="430" width="300" height="56" rx="8"/>
  <text class="th" x="340" y="448" text-anchor="middle" dominant-baseline="central">Implementation</text>
  <text class="ts" x="340" y="468" text-anchor="middle" dominant-baseline="central">test-writer ⇄ implementer, review, QA</text>
</g>
<line x1="340" y1="490" x2="340" y2="540" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="562" text-anchor="middle" dominant-baseline="central">code + tests</text>
</svg>
