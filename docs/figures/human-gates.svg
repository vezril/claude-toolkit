<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 760" role="img">
<title>Human intervention points in the SDLC pipeline</title>
<desc>The pipeline from analysis to shipped code with every human approval gate marked in purple: worth planning, PRD approval, architecture approval, readiness approval, and per-story merge approval; the lint script and LLM review gates run without a human.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;fill:#3d3d3a}
.th{font-size:14px;font-weight:600}
.ts{font-size:12px;fill:#73726c}
.arr{stroke:#73726c;stroke-width:1.5;fill:none}
g.purple>rect{fill:#EEEDFE;stroke:#534AB7}
g.purple text.ts{fill:#3C3489}
g.teal>rect{fill:#E1F5EE;stroke:#0F6E56}
g.teal text.th{fill:#085041}
g.teal text.ts{fill:#0F6E56}
g.coral>rect{fill:#FAECE7;stroke:#993C1D}
g.coral text.th{fill:#712B13}
g.coral text.ts{fill:#993C1D}
g.gray>rect{fill:#F1EFE8;stroke:#5F5E5A}
g.gray text.th{fill:#444441}
g.gray text.ts{fill:#5F5E5A}
g.amber>rect{fill:#FAEEDA;stroke:#854F0B}
g.amber text.ts{fill:#633806}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="760" fill="#ffffff"/>
<g class="gray">
  <rect x="200" y="40" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">Analysis</text>
  <text class="ts" x="340" y="78" text-anchor="middle" dominant-baseline="central">optional discovery</text>
</g>
<line x1="340" y1="96" x2="340" y2="112" class="arr"/>
<g class="purple"><rect x="220" y="112" width="240" height="24" rx="12"/>
  <text class="ts" x="340" y="124" text-anchor="middle" dominant-baseline="central">you: is it worth planning?</text></g>
<line x1="340" y1="136" x2="340" y2="152" class="arr" marker-end="url(#arrow)"/>
<g class="teal">
  <rect x="200" y="152" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="170" text-anchor="middle" dominant-baseline="central">Planning</text>
  <text class="ts" x="340" y="190" text-anchor="middle" dominant-baseline="central">requirements-analyst → PRD</text>
</g>
<line x1="340" y1="208" x2="340" y2="224" class="arr"/>
<g class="purple"><rect x="220" y="224" width="240" height="24" rx="12"/>
  <text class="ts" x="340" y="236" text-anchor="middle" dominant-baseline="central">you approve the PRD</text></g>
<line x1="340" y1="248" x2="340" y2="264" class="arr" marker-end="url(#arrow)"/>
<g class="teal">
  <rect x="200" y="264" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="282" text-anchor="middle" dominant-baseline="central">Architecture</text>
  <text class="ts" x="340" y="302" text-anchor="middle" dominant-baseline="central">solution-architect + ADRs</text>
</g>
<line x1="340" y1="320" x2="340" y2="336" class="arr"/>
<g class="purple"><rect x="220" y="336" width="240" height="24" rx="12"/>
  <text class="ts" x="340" y="348" text-anchor="middle" dominant-baseline="central">you approve the architecture</text></g>
<line x1="340" y1="360" x2="340" y2="376" class="arr" marker-end="url(#arrow)"/>
<g class="teal">
  <rect x="200" y="376" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="394" text-anchor="middle" dominant-baseline="central">Stories</text>
  <text class="ts" x="340" y="414" text-anchor="middle" dominant-baseline="central">story-planner — INVEST stories</text>
</g>
<line x1="340" y1="432" x2="340" y2="448" class="arr"/>
<g class="amber"><rect x="220" y="448" width="240" height="24" rx="12"/>
  <text class="ts" x="340" y="460" text-anchor="middle" dominant-baseline="central">lint gate — script, ↻ rewrite</text></g>
<line x1="340" y1="472" x2="340" y2="488" class="arr"/>
<g class="teal"><rect x="220" y="488" width="240" height="24" rx="12"/>
  <text class="ts" x="340" y="500" text-anchor="middle" dominant-baseline="central">readiness review — LLM</text></g>
<line x1="340" y1="512" x2="340" y2="528" class="arr"/>
<g class="purple"><rect x="220" y="528" width="240" height="24" rx="12"/>
  <text class="ts" x="340" y="540" text-anchor="middle" dominant-baseline="central">you approve readiness</text></g>
<line x1="340" y1="552" x2="340" y2="568" class="arr" marker-end="url(#arrow)"/>
<g class="coral">
  <rect x="200" y="568" width="280" height="56" rx="8"/>
  <text class="th" x="340" y="586" text-anchor="middle" dominant-baseline="central">Implementation</text>
  <text class="ts" x="340" y="606" text-anchor="middle" dominant-baseline="central">test-writer ⇄ implementer, QA</text>
</g>
<line x1="340" y1="624" x2="340" y2="640" class="arr"/>
<g class="purple"><rect x="220" y="640" width="240" height="24" rx="12"/>
  <text class="ts" x="340" y="652" text-anchor="middle" dominant-baseline="central">you approve each story merge</text></g>
<line x1="340" y1="664" x2="340" y2="688" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="706" text-anchor="middle" dominant-baseline="central">shipped</text>
<text class="ts" x="340" y="736" text-anchor="middle" dominant-baseline="central">purple = human required · amber = deterministic script · teal = LLM checker</text>
</svg>
